<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Forgot Password — Laxmi Academy</title>
  <meta name="theme-color" content="#6366f1">
  <script src="theme.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f2ff;
      --surface: rgba(255,255,255,0.92);
      --border: rgba(99,102,241,0.15);
      --text: #0f1023;
      --text-muted: #5c6494;
      --input-bg: rgba(255,255,255,0.9);
      --input-border: rgba(99,102,241,0.2);
      --input-focus: rgba(255,255,255,1);
      --active: #6366f1;
      --active-glow: rgba(99,102,241,0.4);
      --active-soft: rgba(99,102,241,0.12);
    }

    html.dark {
      --bg: #05060f;
      --surface: rgba(8,9,28,0.85);
      --border: rgba(255,255,255,0.08);
      --text: #f0f2ff;
      --text-muted: #8891b4;
      --input-bg: rgba(255,255,255,0.05);
      --input-border: rgba(255,255,255,0.1);
      --input-focus: rgba(255,255,255,0.15);
    }

    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    .bg-orbs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.12;
      animation: drift linear infinite;
    }
    html.dark .orb { opacity: 0.25; }
    .orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, #6366f1, transparent); top: -150px; left: -100px; animation-duration: 20s; }
    .orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, #8b5cf6, transparent); bottom: -100px; right: -50px; animation-duration: 25s; animation-direction: reverse; }
    .orb-3 { width: 300px; height: 300px; background: radial-gradient(circle, #a78bfa, transparent); top: 40%; left: 40%; animation-duration: 30s; animation-delay: -10s; }

    @keyframes drift {
      0%   { transform: translate(0,0) rotate(0deg); }
      33%  { transform: translate(40px,-30px) rotate(120deg); }
      66%  { transform: translate(-30px,40px) rotate(240deg); }
      100% { transform: translate(0,0) rotate(360deg); }
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 2.5rem 2.5rem 2rem;
      box-shadow: 0 20px 60px rgba(99,102,241,0.12), 0 0 0 1px var(--border);
      animation: cardIn 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to   { opacity: 1; transform: none; }
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
      animation: fadeUp 0.4s 0.1s both;
    }
    .logo-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(99,102,241,0.4);
      flex-shrink: 0;
    }
    .logo-icon svg { width: 22px; height: 22px; color: #fff; }
    .logo-text {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
    }
    .logo-text span {
      display: block;
      font-size: 0.72rem;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .page-title {
      margin-bottom: 0.4rem;
      animation: fadeUp 0.4s 0.2s both;
    }
    .page-title h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--text);
    }
    .page-title p {
      font-size: 0.87rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
      line-height: 1.5;
    }

    .form-area { margin-top: 1.75rem; }

    .field {
      margin-bottom: 1rem;
      animation: fadeUp 0.4s 0.3s both;
    }
    .field label {
      display: block;
      font-size: 0.79rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .input-wrap { position: relative; }
    .input-wrap > svg {
      position: absolute;
      left: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--text-muted);
      pointer-events: none;
      transition: color 0.3s;
    }
    .input-wrap input {
      width: 100%;
      padding: 0.82rem 0.9rem 0.82rem 2.6rem;
      background: var(--input-bg);
      border: 1.5px solid var(--input-border);
      border-radius: 12px;
      color: var(--text);
      font-size: 0.9rem;
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    }
    .input-wrap input::placeholder { color: var(--text-muted); opacity: 0.6; }
    .input-wrap input:focus {
      border-color: var(--active);
      box-shadow: 0 0 0 3px var(--active-glow);
      background: var(--input-focus);
    }
    .input-wrap input:focus ~ svg,
    .input-wrap:focus-within > svg { color: var(--active); }

    .error-msg {
      display: none;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      padding: 0.65rem 0.9rem;
      color: #f87171;
      font-size: 0.82rem;
      margin-bottom: 1rem;
      gap: 0.5rem;
      align-items: center;
    }
    .error-msg.show { display: flex; }

    .success-msg {
      display: none;
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.3);
      border-radius: 10px;
      padding: 0.65rem 0.9rem;
      color: #34d399;
      font-size: 0.84rem;
      margin-bottom: 1rem;
      gap: 0.5rem;
      align-items: flex-start;
      line-height: 1.5;
    }
    .success-msg.show { display: flex; }

    .btn-submit {
      width: 100%;
      padding: 0.9rem;
      background: var(--active);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: 'Outfit', sans-serif;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 6px 24px var(--active-glow);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.03em;
      animation: fadeUp 0.4s 0.4s both;
    }
    .btn-submit::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 32px var(--active-glow); }
    .btn-submit:hover::after { left: 160%; }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    .back-link-row {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.84rem;
      color: var(--text-muted);
      animation: fadeUp 0.4s 0.5s both;
    }
    .back-link-row a {
      color: var(--active);
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }
    .back-link-row a:hover { text-decoration: underline; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: none; }
    }

    @media (max-width: 480px) {
      body { padding: 1rem; }
      .card { padding: 1.75rem 1.25rem 1.5rem; }
      .page-title h1 { font-size: 1.35rem; }
    }
  </style>
</head>
<body>

  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="card">
    <div class="logo-row">
      <div class="logo-icon">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 14l9-5-9-5-9 5 9 5z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0112 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/>
        </svg>
      </div>
      <div class="logo-text">
        Laxmi Academy
        <span>Physics Portal</span>
      </div>
    </div>

    <div class="page-title">
      <h1>Forgot Password</h1>
      <p>Enter your registered email and we'll send you a link to reset your password.</p>
    </div>

    <div id="form-area" class="form-area">
      <div class="error-msg" id="error-msg">
        <svg width="15" height="15" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z"/></svg>
        <span id="error-text">Something went wrong.</span>
      </div>

      <div class="success-msg" id="success-msg">
        <svg width="15" height="15" fill="currentColor" viewBox="0 0 20 20" style="flex-shrink:0;margin-top:2px"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"/></svg>
        <span id="success-text">Check your email for a reset link. It may take a minute to arrive.</span>
      </div>

      <form id="reset-form" onsubmit="handleSubmit(event)">
        <div class="field">
          <label for="email">Registered Email</label>
          <div class="input-wrap">
            <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
            <input type="email" id="email" name="email" placeholder="you@email.com" required autocomplete="email"/>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="submit-btn">Send Reset Link</button>
      </form>
    </div>

    <div class="back-link-row">
      <a href="login.html">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        Back to Login
      </a>
    </div>
  </div>

  <script>
    async function handleSubmit(e) {
      e.preventDefault();
      const email  = document.getElementById('email').value.trim();
      const btn    = document.getElementById('submit-btn');
      const errEl  = document.getElementById('error-msg');
      const succEl = document.getElementById('success-msg');

      errEl.classList.remove('show');
      succEl.classList.remove('show');

      if (!email) {
        document.getElementById('error-text').textContent = 'Please enter your email address.';
        errEl.classList.add('show');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Sending…';

      try {
        const res  = await fetch('/api/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json().catch(() => ({}));

        if (res.ok) {
          document.getElementById('reset-form').style.display = 'none';
          succEl.classList.add('show');
          btn.style.display = 'none';
        } else {
          document.getElementById('error-text').textContent = data.error || 'Failed to send reset link. Please try again.';
          errEl.classList.add('show');
          btn.disabled = false;
          btn.textContent = 'Send Reset Link';
        }
      } catch {
        document.getElementById('error-text').textContent = 'Server not reachable. Please try again later.';
        errEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
      }
    }
  </script>
</body>
</html>
