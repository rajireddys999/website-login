<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login — Laxmi Academy</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%);
      padding: 1.5rem;
      transition: background 0.3s;
    }

    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      transition: background 0.3s, box-shadow 0.3s;
    }

    /* Logo / Header */
    .card-header {
      text-align: center;
      margin-bottom: 1.8rem;
    }
    .card-header img {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #e0e7ff;
      margin-bottom: 0.8rem;
    }
    .card-header h2 {
      font-size: 1.5rem;
      font-weight: 800;
      color: #1e1b4b;
      transition: color 0.3s;
    }
    .card-header p {
      font-size: 0.85rem;
      color: #6b7280;
      margin-top: 0.25rem;
      transition: color 0.3s;
    }

    /* Role Tabs */
    .tabs {
      display: flex;
      background: #f3f4f6;
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 1.5rem;
      gap: 4px;
      transition: background 0.3s;
    }
    .tab {
      flex: 1;
      padding: 0.5rem;
      border-radius: 7px;
      font-size: 0.83rem;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      color: #6b7280;
    }
    .tab.active {
      background: #4f46e5;
      color: #fff;
      box-shadow: 0 3px 10px rgba(79, 70, 229, 0.4);
    }

    /* Fields */
    .field { margin-bottom: 1.1rem; }
    .field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.4rem;
      transition: color 0.3s;
    }

    .input-wrap { position: relative; }

    /* Only style DIRECT child SVGs (left icons), not the eye-btn SVG */
    .input-wrap > svg {
      position: absolute;
      left: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: #9ca3af;
      pointer-events: none;
      transition: color 0.3s;
    }
    .input-wrap input {
      width: 100%;
      padding: 0.75rem 0.85rem 0.75rem 2.35rem;
      background: #f9fafb;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      color: #111827;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.3s, color 0.3s;
    }
    .input-wrap input.has-eye {
      padding-right: 2.8rem;
    }
    .input-wrap input::placeholder { color: #9ca3af; }
    .input-wrap input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
      background: #fff;
    }

    .eye-btn {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #9ca3af;
      padding: 0.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
      line-height: 0;
    }
    .eye-btn:hover { color: #4f46e5; }
    .eye-btn svg {
      width: 18px;
      height: 18px;
      pointer-events: none;
    }

    .forgot { text-align: right; margin-top: 0.4rem; }
    .forgot a {
      font-size: 0.78rem;
      color: #4f46e5;
      font-weight: 600;
      text-decoration: none;
    }
    .forgot a:hover { text-decoration: underline; }

    /* Error */
    .error-msg {
      display: none;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 0.6rem 0.85rem;
      color: #dc2626;
      font-size: 0.82rem;
      margin-bottom: 1rem;
    }
    .error-msg.show { display: flex; align-items: center; gap: 0.5rem; }

    /* Submit */
    .btn-submit {
      width: 100%;
      padding: 0.85rem;
      background: #4f46e5;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(79, 70, 229, 0.35);
      transition: background 0.2s, transform 0.15s, box-shadow 0.15s;
      margin-top: 0.25rem;
    }
    .btn-submit:hover {
      background: #4338ca;
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(79, 70, 229, 0.45);
    }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Divider + signup */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.2rem 0;
      color: #d1d5db;
      font-size: 0.78rem;
      transition: color 0.3s;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: #e5e7eb;
      transition: background 0.3s;
    }

    .signup-row {
      text-align: center;
      font-size: 0.84rem;
      color: #6b7280;
      transition: color 0.3s;
    }
    .signup-row a {
      color: #4f46e5;
      font-weight: 700;
      text-decoration: none;
    }
    .signup-row a:hover { text-decoration: underline; }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.78rem;
      color: #9ca3af;
      text-decoration: none;
      margin-bottom: 1.5rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: #4f46e5; }

    /* Success overlay */
    .success-overlay {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1rem;
    }
    .success-overlay.show { display: flex; }
    .success-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #10b981, #059669);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      color: #fff;
      margin-bottom: 1.2rem;
      box-shadow: 0 0 24px rgba(16, 185, 129, 0.35);
      animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes pop { from { transform: scale(0) } to { transform: scale(1) } }
    .success-overlay h3 { font-size: 1.3rem; font-weight: 800; color: #111827; margin-bottom: 0.5rem; transition: color 0.3s; }
    .success-overlay p { color: #6b7280; font-size: 0.88rem; transition: color 0.3s; }

    /* ─── Theme Toggle Button ─── */
    #theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1.5px solid rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.2s, border-color 0.3s;
      z-index: 1000;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    }
    #theme-toggle:hover {
      background: rgba(255, 255, 255, 0.28);
      transform: scale(1.1) rotate(15deg);
    }

    /* ─── DARK MODE ─── */
    body.dark {
      background: linear-gradient(135deg, #0a0818 0%, #1a1740 50%, #0a0818 100%);
    }
    body.dark #theme-toggle {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
    }
    body.dark .login-card {
      background: #1e293b;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
    }
    body.dark .card-header h2 { color: #f1f5f9; }
    body.dark .card-header p { color: #94a3b8; }
    body.dark .tabs { background: #0f172a; }
    body.dark .tab { color: #94a3b8; }
    body.dark .tab.active { background: #4f46e5; color: #fff; }
    body.dark .field label { color: #cbd5e1; }
    body.dark .input-wrap > svg { color: #64748b; }
    body.dark .input-wrap input {
      background: #0f172a;
      border-color: #334155;
      color: #f1f5f9;
    }
    body.dark .input-wrap input::placeholder { color: #64748b; }
    body.dark .input-wrap input:focus {
      border-color: #818cf8;
      box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.2);
      background: #1e293b;
    }
    body.dark .eye-btn { color: #64748b; }
    body.dark .eye-btn:hover { color: #818cf8; }
    body.dark .forgot a { color: #818cf8; }
    body.dark .error-msg {
      background: #450a0a;
      border-color: #b91c1c;
      color: #fca5a5;
    }
    body.dark .divider { color: #4b5563; }
    body.dark .divider::before, body.dark .divider::after { background: #374151; }
    body.dark .signup-row { color: #94a3b8; }
    body.dark .signup-row a { color: #818cf8; }
    body.dark .back-link { color: #475569; }
    body.dark .back-link:hover { color: #818cf8; }
    body.dark .success-overlay h3 { color: #f1f5f9; }
    body.dark .success-overlay p { color: #94a3b8; }
  </style>
</head>
<body>

  <!-- Dark / Light mode toggle -->
  <button id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark/light mode">
    <span id="theme-icon">🌙</span>
  </button>

  <div class="login-card">
    <!-- Normal login view -->
    <div id="form-view">
      <a href="index.html" class="back-link">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        Back to Home
      </a>

      <div class="card-header">
        <img src="logo.png.jpeg" alt="Laxmi Academy"/>
        <h2>Welcome Back</h2>
        <p>Sign in to your Laxmi Academy portal</p>
      </div>

      <!-- Role tabs -->
      <div class="tabs">
        <button class="tab active" onclick="switchTab(this,'student')">Student</button>
        <button class="tab" onclick="switchTab(this,'instructor')">Instructor</button>
        <button class="tab" onclick="switchTab(this,'admin')">Admin</button>
      </div>

      <div class="error-msg" id="error-msg">
        <svg width="14" height="14" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z"/></svg>
        <span id="error-text">Invalid email or password.</span>
      </div>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="field">
          <label for="email">Email / Phone</label>
          <div class="input-wrap">
            <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/></svg>
            <input type="text" id="email" placeholder="Enter email or phone" required autocomplete="username"/>
          </div>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            <input type="password" id="password" class="has-eye" placeholder="Enter your password" required autocomplete="current-password"/>
            <button type="button" class="eye-btn" onclick="togglePassword()" aria-label="Show/hide password">
              <svg id="eye-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
          <div class="forgot"><a href="#" onclick="showForgot(event)">Forgot password?</a></div>
        </div>

        <button type="submit" class="btn-submit" id="submit-btn">Sign In</button>
      </form>

      <div class="divider">or</div>
      <div class="signup-row">
        New student? <a href="signup.html">Create an account</a>
      </div>
    </div>

    <!-- Success view -->
    <div class="success-overlay" id="success-view">
      <div class="success-icon">✓</div>
      <h3>Login Successful!</h3>
      <p>Welcome back, <strong id="success-name"></strong>! Redirecting...</p>
    </div>

    <!-- Forgot password view -->
    <div id="forgot-view" style="display:none">
      <button onclick="showLogin()" class="back-link" style="background:none;border:none;cursor:pointer;margin-bottom:1.5rem">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        Back to Login
      </button>
      <div class="card-header">
        <h2>Reset Password</h2>
        <p>Enter your registered email to receive a reset link.</p>
      </div>
      <form onsubmit="handleForgot(event)" style="margin-top:1.5rem">
        <div class="field">
          <label>Registered Email</label>
          <div class="input-wrap">
            <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            <input type="email" placeholder="you@email.com" required/>
          </div>
        </div>
        <button type="submit" class="btn-submit">Send Reset Link</button>
      </form>
    </div>
  </div>

  <script>
    // Apply saved theme before first paint
    (function () {
      if (localStorage.getItem('la_theme') === 'dark') {
        document.body.classList.add('dark');
      }
    })();

    // Update icon after DOM is ready
    document.addEventListener('DOMContentLoaded', function () {
      if (document.body.classList.contains('dark')) {
        document.getElementById('theme-icon').textContent = '☀️';
      }
    });

    function toggleTheme() {
      const isDark = document.body.classList.toggle('dark');
      document.getElementById('theme-icon').textContent = isDark ? '☀️' : '🌙';
      localStorage.setItem('la_theme', isDark ? 'dark' : 'light');
    }

    let activeRole = 'student';

    function switchTab(btn, role) {
      activeRole = role;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      document.querySelector('label[for="email"]').textContent =
        role === 'admin' ? 'Admin Email' : role === 'instructor' ? 'Instructor Email' : 'Email / Phone';
      hideError();
    }

    function togglePassword() {
      const inp = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (inp.type === 'password') {
        inp.type = 'text';
        icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>';
      } else {
        inp.type = 'password';
        icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
      }
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      document.getElementById('error-text').textContent = msg;
      el.classList.add('show');
    }
    function hideError() { document.getElementById('error-msg').classList.remove('show'); }

    async function handleLogin(e) {
      e.preventDefault();
      hideError();
      const btn        = document.getElementById('submit-btn');
      const identifier = document.getElementById('email').value.trim();
      const password   = document.getElementById('password').value;

      if (!identifier || !password) {
        showError('Please fill in all fields.'); return;
      }

      btn.disabled = true; btn.textContent = 'Signing in...';

      try {
        const res  = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier, password, role: activeRole })
        });
        const data = await res.json();

        if (!res.ok) {
          showError(data.error || 'Login failed. Please try again.');
          btn.disabled = false; btn.textContent = 'Sign In';
          return;
        }

        localStorage.setItem('la_token', data.token);
        localStorage.setItem('la_role',  data.role);
        localStorage.setItem('la_user',  JSON.stringify(data.user));

        const name = data.user.full_name || data.user.name || 'Student';
        document.getElementById('success-name').textContent = name;
        document.getElementById('form-view').style.display = 'none';
        document.getElementById('success-view').classList.add('show');
        setTimeout(() => {
          if (data.role === 'admin') window.location.href = 'admin-dashboard.html';
          else if (data.role === 'instructor') window.location.href = 'instructor-dashboard.html';
          else window.location.href = 'dashboard.html';
        }, 2000);

      } catch (err) {
        showError('Server not reachable. Please make sure the server is running.');
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    }

    function showForgot(e) {
      e.preventDefault();
      document.getElementById('form-view').style.display = 'none';
      document.getElementById('forgot-view').style.display = 'block';
    }
    function showLogin() {
      document.getElementById('forgot-view').style.display = 'none';
      document.getElementById('form-view').style.display = 'block';
    }
    function handleForgot(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.textContent = 'Reset link sent!';
      btn.disabled = true;
      setTimeout(showLogin, 2000);
    }
  </script>
</body>
</html>
